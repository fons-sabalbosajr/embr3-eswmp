server {
    listen 80;
    server_name embr3-onlinesystems.cloud;

    # Redirect HTTP to HTTPS (uncomment after SSL setup)
    # return 301 https://$host$request_uri;

    # API proxy — forward to Node.js backend
    # Matches /eswm-pipeline/api/ (frontend baseURL) and rewrites to /api/
    location /eswm-pipeline/api/ {
        rewrite ^/eswm-pipeline(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Also match direct /api/ calls (e.g. health checks)
    location /api/ {
        proxy_pass http://127.0.0.1:5003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Socket.IO — WebSocket proxy to Node.js backend
    location /eswm-pipeline/socket.io/ {
        proxy_pass http://127.0.0.1:5003/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Frontend — serve Vite build output
    location /eswm-pipeline/ {
        alias /var/www/eswm-pipeline/dist/;
        try_files $uri $uri/ /eswm-pipeline/index.html;
    }

    # Root redirect
    location = / {
        return 302 /eswm-pipeline/slfportal/login;
    }
}

